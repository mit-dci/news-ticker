<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE NEWS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate" type="application/rss+xml" title="MIT DCI – Curated Crypto News" href="feed.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0a;
    --bg-2: #0f1410;
    --fg: #e8e4d4;
    --dim: #7a8175;
    --amber: #ffb000;
    --green: #33ff66;
    --red: #ff4d4d;
    --border: #1e2820;
    --card: #121812;
    --ticker-bg: #000;
    --ticker-duration: 300s;
    --scanline-color: rgba(255,255,255,0.012);
    --vignette-color: rgba(0,0,0,0.55);
  }
  [data-theme="light"] {
    --bg: #f2ede3;
    --bg-2: #e8e2d6;
    --fg: #1a1a14;
    --dim: #7a7060;
    --amber: #b87800;
    --green: #006622;
    --red: #cc2200;
    --border: #ccc6b8;
    --card: #ede8dc;
    --ticker-bg: #ddd8cc;
    --scanline-color: rgba(0,0,0,0.03);
    --vignette-color: rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f2ede3;
      --bg-2: #e8e2d6;
      --fg: #1a1a14;
      --dim: #7a7060;
      --amber: #b87800;
      --green: #006622;
      --red: #cc2200;
      --border: #ccc6b8;
      --card: #ede8dc;
      --ticker-bg: #ddd8cc;
      --scanline-color: rgba(0,0,0,0.03);
      --vignette-color: rgba(0,0,0,0.12);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      var(--scanline-color) 0px,
      var(--scanline-color) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 100;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, var(--vignette-color) 100%);
    z-index: 101;
  }

  header {
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 {
    font-family: 'VT323', monospace;
    font-size: 38px;
    color: var(--amber);
    letter-spacing: 3px;
    line-height: 1;
    text-shadow: 0 0 12px rgba(255,176,0,0.35);
  }
  .brand .sub {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .status {
    display: flex; align-items: center; gap: 18px;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--dim);
  }
  .live {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--green);
  }
  .live::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 7px 14px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:hover { color: var(--fg); border-color: var(--dim); }
  .btn.active {
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }

  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 24px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filters .label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-right: 6px;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 4px 10px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--fg); border-color: var(--dim); }
  .filter-btn.dimmed { opacity: 0.35; }
  .filter-btn.active {
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }
  .filter-btn .count-badge {
    font-size: 9px;
    opacity: 0.7;
    margin-left: 4px;
  }

  .ticker-bar {
    background: var(--ticker-bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    height: 44px;
    display: flex;
    align-items: center;
  }
  .ticker-label {
    flex-shrink: 0;
    background: var(--amber);
    color: #000;
    font-weight: 800;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    letter-spacing: 2px;
    font-size: 12px;
    z-index: 2;
    box-shadow: 4px 0 10px rgba(0,0,0,0.6);
  }
  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: scroll var(--ticker-duration) linear infinite;
    will-change: transform;
  }
  .ticker-bar:hover .ticker-track { animation-play-state: paused; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    padding: 0 22px;
    font-size: 14px;
    color: var(--fg);
    text-decoration: none;
  }
  .ticker-item:hover { color: var(--amber); }
  .ticker-item .src {
    color: var(--green);
    margin-right: 10px;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .ticker-item .sep { color: var(--dim); margin: 0 16px; }
  .ticker-item .age { color: var(--dim); font-size: 11px; margin-left: 8px; }

  /* ---- flash ticker (single-story scroll) ---- */
  .flash-bar {
    background: var(--ticker-bg);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
  }
  .flash-track {
    display: flex;
    white-space: nowrap;
    will-change: transform;
  }
  .flash-bar:hover .flash-track { animation-play-state: paused; }
  @keyframes flashScroll {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
  }
  .flash-item {
    display: inline-flex;
    align-items: center;
    padding: 0 18px;
    font-size: 12px;
    color: var(--fg);
    text-decoration: none;
    white-space: nowrap;
  }
  .flash-item:hover { color: var(--amber); }
  .flash-item .src {
    color: var(--green);
    margin-right: 10px;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .flash-item .desc { color: var(--dim); margin-left: 10px; font-size: 11px; }
  .flash-item .age { color: var(--dim); font-size: 10px; margin-left: 8px; }

  main {
    padding: 32px 24px 64px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .section-head h2 {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: var(--amber);
    letter-spacing: 2px;
  }
  .section-head .count {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
    text-decoration: none;
    color: var(--fg);
    transition: all 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--amber);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--border);
  }
  .card .meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .card .src-tag {
    color: #000;
    padding: 3px 8px;
    font-weight: 800;
  }
  .card .src-tag.block         { background: var(--amber); }
  .card .src-tag.coindesk      { background: var(--green); }
  .card .src-tag.cointelegraph { background: #00b4d8; }
  .card .src-tag.bitcoinmag    { background: #f4a522; }
  .card .src-tag.decrypt       { background: #a855f7; color: #fff; }
  .card .src-tag.defiant       { background: #ef4444; color: #fff; }
  .card .src-tag.bitcoinops    { background: #f97316; }
  .card .src-tag.bcannounce    { background: #6366f1; color: #fff; }
  .card .src-tag.bitcoincore   { background: #3b82f6; color: #fff; }
  .card .src-tag.coincenter    { background: #2d6a4f; color: #fff; }
  .card .src-tag.fed           { background: #1a3c5e; color: #fff; }
  .card .src-tag.techcrunch    { background: #0a9e01; color: #fff; }
  .card .src-tag.bis           { background: #003399; color: #fff; }
  .card .src-tag.pymnts        { background: #1e3a5f; color: #fff; }
  .card .src-tag.finextra      { background: #0077b6; color: #fff; }
  .card .src-tag.ft            { background: #fff1e5; color: #33302e; }
  .card .src-tag.economist     { background: #e3120b; color: #fff; }
  .card .src-tag.wsj           { background: #0274b6; color: #fff; }
  .card .time { color: var(--dim); }
  .card h3 {
    font-size: 16px;
    line-height: 1.35;
    font-weight: 500;
  }
  .card p {
    color: var(--dim);
    font-size: 12px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: auto;
  }
  .topic-tag {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid var(--border);
    color: var(--dim);
    border-radius: 2px;
  }
  .topic-tag.bitcoin     { color: #f7931a; border-color: #f7931a; }
  .topic-tag.stablecoins { color: #2775ca; border-color: #2775ca; }
  .topic-tag.cbdc        { color: #8b5cf6; border-color: #8b5cf6; }
  .topic-tag.tokenized   { color: #06b6d4; border-color: #06b6d4; }
  .topic-tag.us          { color: #ef4444; border-color: #ef4444; }
  .topic-tag.europe      { color: #3b82f6; border-color: #3b82f6; }
  .topic-tag.china-hk    { color: #f59e0b; border-color: #f59e0b; }
  .topic-tag.asia-pacific { color: #10b981; border-color: #10b981; }
  .topic-tag.india       { color: #f97316; border-color: #f97316; }
  .topic-tag.mena        { color: #a78bfa; border-color: #a78bfa; }
  .topic-tag.africa      { color: #34d399; border-color: #34d399; }
  .topic-tag.latam       { color: #fb923c; border-color: #fb923c; }
  .topic-tag.intl-org    { color: #60a5fa; border-color: #60a5fa; }
  .topic-tag.thought     { color: #a1a1aa; border-color: #a1a1aa; }

  .search-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 20px;
  }
  .search-wrap::before {
    content: ">";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--amber);
    font-family: 'VT323', monospace;
    font-size: 20px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 36px 10px 30px;
    letter-spacing: 0.5px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder {
    color: var(--dim);
    opacity: 0.6;
  }
  .search-input:focus {
    border-color: var(--amber);
  }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    display: none;
    font-family: inherit;
  }
  .search-clear:hover { color: var(--fg); }
  .search-wrap.has-query .search-clear { display: block; }
  .search-highlight {
    background: rgba(255, 176, 0, 0.25);
    border-radius: 1px;
  }

  .state {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 13px;
    letter-spacing: 1px;
  }
  .state.err { color: var(--red); }
  .state .blink { animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
  }
  footer a { color: var(--amber); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>THE NEWS</h1>
  </div>
  <div class="controls" id="controls">
    <a class="btn" href="feed.xml" title="Curated RSS Feed">&#9776; RSS</a>
    <button class="btn" id="refreshBtn">&#8635; RELOAD</button>
    <button class="btn" id="themeBtn">&#9788; LIGHT</button>
  </div>
  <div class="status">
    <span class="live">LIVE</span>
    <span id="lastUpdate">—</span>
  </div>
</header>

<div class="ticker-bar">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item"><span class="src">SYS</span>loading<span class="blink">_</span></span>
  </div>
</div>

<div class="flash-bar">
  <div class="flash-track" id="flashTrack"></div>
</div>

<div class="filters" id="filters">
  <span class="label">Topic:</span>
  <button class="filter-btn active" data-topic="all">All</button>
</div>

<main>
  <div class="section-head">
    <h2>&gt; LATEST STORIES</h2>
    <span class="count"><span id="storyCount">—</span></span>
  </div>
  <div class="search-wrap" id="searchWrap">
    <input class="search-input" id="searchInput" type="text" placeholder="search stories..." autocomplete="off" spellcheck="false">
    <button class="search-clear" id="searchClear">&times;</button>
  </div>
  <div id="grid" class="grid"></div>
  <div id="state" class="state"><span class="blink">▮</span> loading…</div>
</main>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  // Constant scroll speed in pixels per second. Higher = faster.
  const TICKER_PX_PER_SEC = 80;

  // Where to load the data. Default reads the committed file relative
  // to the page. Add a cache-buster so you see updates after a push.
  const DATA_URL = 'stories.json';

  // Periodically re-read stories.json so the page stays fresh without
  // a manual reload.
  const POLL_MS = 5 * 60 * 1000;

  // Scroll speed for the single-story flash ticker (px/sec). Faster than main.
  const FLASH_PX_PER_SEC = 160;

  // NOTE: keyword filtering happens in scripts/fetch-feeds.mjs, not here.
  // That way filtered-out stories never even land in the JSON.

  // ============================================================
  // THEME
  // ============================================================
  const themeBtn = document.getElementById('themeBtn');

  function getSystemTheme() {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'light' ? '☽ DARK' : '☀ LIGHT';
    localStorage.setItem('theme', theme);
  }

  // Init: use saved preference, else follow system
  applyTheme(localStorage.getItem('theme') || getSystemTheme());

  themeBtn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // ============================================================
  // STATE
  // ============================================================
  let allItems = [];
  let payloadMeta = {};
  let currentFilter = 'all';
  let currentTopic = 'all';
  let searchQuery = '';
  let flashTimer = null;
  let flashIndex = 0;
  let flashAnimating = false;

  // ============================================================
  // TOPIC DETECTION
  // ============================================================
  const TOPIC_RULES = [
    { id: 'us', label: 'US', patterns: [
      /\b(SEC|CFTC|FinCEN|OCC|FDIC|IRS|DOJ|FBI|Treasury|Fed\b|Federal Reserve)\b/i,
      /\bSenate\b|\bCongress\b|\bHouse (of )?Rep/i,
      /\b(US|U\.S\.|United States|American)\b/i,
      /\b(GENIUS Act|CLARITY Act|stablecoin bill|crypto bill)\b/i,
      /\b(Wall Street|New York|Washington|Silicon Valley)\b/i,
    ]},
    { id: 'europe', label: 'Europe / Canada / UK', patterns: [
      /\b(EU|European|MiCA|ECB|Europe)\b/i,
      /\b(UK|Britain|British|FCA|Bank of England)\b/i,
      /\b(Canada|Canadian|OSC)\b/i,
      /\b(Switzerland|Swiss|FINMA|Germany|German|BaFin|France|French|AMF)\b/i,
      /\b(Netherlands|Ireland|Luxembourg|Spain|Italy|Portugal|Sweden|Norway|Denmark|Finland|Poland|Austria|Belgium|Czech)\b/i,
    ]},
    { id: 'china-hk', label: 'China + HK', patterns: [
      /\b(China|Chinese|Beijing|Shanghai|PBoC|PBOC)\b/i,
      /\b(Hong Kong|HK|HKMA|SFC)\b/i,
    ]},
    { id: 'asia-pacific', label: 'Asia Pacific', patterns: [
      /\b(Japan|Japanese|FSA|BOJ)\b/i,
      /\b(South Korea|Korean)\b/i,
      /\b(Singapore|MAS)\b/i,
      /\b(Australia|Australian|ASIC)\b/i,
      /\b(Southeast Asia|Vietnam|Thailand|Philippines|Indonesia|Malaysia|Taiwan)\b/i,
    ]},
    { id: 'india', label: 'India', patterns: [
      /\b(India|Indian|RBI|SEBI|Mumbai|Delhi)\b/i,
    ]},
    { id: 'mena', label: 'MENA', patterns: [
      /\b(UAE|Dubai|Abu Dhabi|ADGM|VARA)\b/i,
      /\b(Saudi|Riyadh)\b/i,
      /\b(Israel|Israeli)\b/i,
      /\b(Turkey|Turkish|Türkiye)\b/i,
      /\b(Bahrain|Qatar|Kuwait|Oman|Jordan|Egypt|Morocco)\b/i,
    ]},
    { id: 'africa', label: 'Africa', patterns: [
      /\b(Nigeria|Nigerian|Kenya|Kenyan|South Africa)\b/i,
      /\b(Africa|African)\b/i,
      /\b(Ghana|Ethiopia|Tanzania|Uganda|Rwanda)\b/i,
    ]},
    { id: 'latam', label: 'LATAM', patterns: [
      /\b(Brazil|Brazilian|Argentina|Argentine|Mexico|Mexican)\b/i,
      /\b(El Salvador|Colombia|Chile|Peru|Venezuela)\b/i,
      /\b(Latin America|LATAM)\b/i,
    ]},
    { id: 'intl-org', label: 'Intl Orgs', patterns: [
      /\b(IMF|BIS|FATF|World Bank|G7|G20|UN|OECD|FSB)\b/i,
      /\b(international|global (regul|standard|framework))/i,
    ]},
    { id: 'bitcoin', label: 'Bitcoin', patterns: [
      /\b(Bitcoin|BTC|Lightning Network|Satoshi|halving)\b/i,
      /\b(Bitcoin Core|Bitcoin Optech|bitcoin mining)\b/i,
    ]},
    { id: 'stablecoins', label: 'Stablecoins', patterns: [
      /\b(stablecoin|USDT|USDC|Tether|Circle|DAI|PYUSD|FDUSD|TUSD|BUSD)\b/i,
      /\b(stablecoin bill|stablecoin yield|stablecoin reg)/i,
    ]},
    { id: 'cbdc', label: 'CBDCs', patterns: [
      /\b(CBDC|central bank digital currency|digital euro|digital dollar|digital yuan|e-CNY|digital rupee|DREX)\b/i,
      /\b(digital currency initiative|wholesale CBDC|retail CBDC)\b/i,
    ]},
    { id: 'tokenized', label: 'Tokenized Deposits', patterns: [
      /\b(tokenized deposit|deposit token|tokenised deposit)\b/i,
      /\b(tokeniz(ed|ation|ing)|tokenis(ed|ation|ing))\b/i,
      /\b(real.world asset|RWA|on.chain (bond|treasury|fund|securit))\b/i,
    ]},
    { id: 'thought', label: 'Thought Pieces', patterns: [
      /\b(opinion|editorial|analysis|interview|podcast|report)\b/i,
      /\b(research paper|white paper|deep dive|long read)\b/i,
    ]},
  ];

  function detectTopics(item) {
    const text = (item.title || '') + ' ' + (item.desc || '');
    const topics = [];
    for (const rule of TOPIC_RULES) {
      if (rule.patterns.some(p => p.test(text))) topics.push(rule.id);
    }
    if (!topics.length) topics.push('company');
    return topics;
  }

  function buildFilterBar() {
    const bar = document.getElementById('filters');
    const counts = { all: allItems.length };
    for (const item of allItems) {
      for (const t of item.topics) {
        counts[t] = (counts[t] || 0) + 1;
      }
    }

    const TOPIC_ORDER = ['all', 'bitcoin', 'stablecoins', 'cbdc', 'tokenized', 'us', 'europe', 'china-hk', 'asia-pacific', 'india', 'mena', 'africa', 'latam', 'intl-org', 'company', 'thought'];
    const TOPIC_LABELS = { all: 'All', bitcoin: 'Bitcoin', stablecoins: 'Stablecoins', cbdc: 'CBDCs', tokenized: 'Tokenization', us: 'US', europe: 'EU / CA / UK', 'china-hk': 'China + HK', 'asia-pacific': 'Asia Pacific', india: 'India', mena: 'MENA', africa: 'Africa', latam: 'LATAM', 'intl-org': 'Intl Orgs', company: 'Company', thought: 'Thought Pieces' };

    bar.innerHTML = '<span class="label">Topic:</span>';
    for (const id of TOPIC_ORDER) {
      const count = counts[id] || 0;
      const active = id === currentTopic ? ' active' : '';
      const dimmed = count === 0 && id !== 'all' ? ' dimmed' : '';
      bar.innerHTML += `<button class="filter-btn${active}${dimmed}" data-topic="${id}">${TOPIC_LABELS[id]}<span class="count-badge">${count}</span></button>`;
    }
  }

  // ============================================================
  // DEMO / FALLBACK DATA
  // ============================================================
  const DEMO_ITEMS = [
    { title: 'SEC Approves New Framework for Digital Asset Custody', link: '#', sourceName: 'THE BLOCK', source: 'block', desc: 'The SEC has approved a new framework allowing banks to custody digital assets under existing regulatory structures, marking a shift in US crypto policy.', date: new Date(Date.now() - 2 * 3600000).toISOString() },
    { title: 'Bitcoin Surpasses $100K as Institutional Demand Surges', link: '#', sourceName: 'COINDESK', source: 'coindesk', desc: 'Bitcoin crossed the $100,000 mark for the first time as ETF inflows hit record levels and corporate treasury adoption accelerates.', date: new Date(Date.now() - 4 * 3600000).toISOString() },
    { title: 'European Central Bank Launches Digital Euro Pilot Program', link: '#', sourceName: 'COINTELEGRAPH', source: 'cointelegraph', desc: 'The ECB has begun a limited pilot of the digital euro across five member states, testing retail payment use cases with selected banks.', date: new Date(Date.now() - 6 * 3600000).toISOString() },
    { title: 'Lightning Network Capacity Hits All-Time High of 8,000 BTC', link: '#', sourceName: 'BITCOIN MAGAZINE', source: 'bitcoinmag', desc: 'The Lightning Network has reached a new milestone with over 8,000 BTC in channel capacity, driven by growing merchant adoption.', date: new Date(Date.now() - 8 * 3600000).toISOString() },
    { title: 'Hong Kong Grants Licenses to Three New Crypto Exchanges', link: '#', sourceName: 'THE BLOCK', source: 'block', desc: 'Hong Kong\'s SFC has approved three additional virtual asset trading platforms as the city expands its position as a regional crypto hub.', date: new Date(Date.now() - 10 * 3600000).toISOString() },
    { title: 'IMF Publishes Global Standards for Crypto Taxation', link: '#', sourceName: 'COINDESK', source: 'coindesk', desc: 'The International Monetary Fund has released comprehensive guidelines for crypto tax reporting, urging member nations to adopt uniform standards.', date: new Date(Date.now() - 12 * 3600000).toISOString() },
    { title: 'Kraken Acquires European Payments Firm for $600M', link: '#', sourceName: 'DECRYPT', source: 'decrypt', desc: 'Kraken\'s parent company Payward has acquired a European payments firm to expand stablecoin settlement capabilities across the continent.', date: new Date(Date.now() - 14 * 3600000).toISOString() },
    { title: 'Brazil Central Bank Advances CBDC Rollout to 2026', link: '#', sourceName: 'COINTELEGRAPH', source: 'cointelegraph', desc: 'Brazil\'s central bank has accelerated its DREX digital currency timeline, with a full public launch now planned for early 2026.', date: new Date(Date.now() - 16 * 3600000).toISOString() },
    { title: 'Nigeria Lifts Ban on Cryptocurrency Trading', link: '#', sourceName: 'THE DEFIANT', source: 'defiant', desc: 'Nigeria\'s Securities and Exchange Commission has officially reversed its 2021 ban on crypto trading, introducing a new licensing framework.', date: new Date(Date.now() - 18 * 3600000).toISOString() },
    { title: 'UAE Regulator VARA Issues New Stablecoin Guidelines', link: '#', sourceName: 'THE BLOCK', source: 'block', desc: 'Dubai\'s Virtual Assets Regulatory Authority has published updated rules for stablecoin issuance and reserve requirements in the emirate.', date: new Date(Date.now() - 20 * 3600000).toISOString() },
    { title: 'India\'s RBI Explores Blockchain for Cross-Border Payments', link: '#', sourceName: 'COINDESK', source: 'coindesk', desc: 'The Reserve Bank of India is piloting a blockchain-based system for cross-border remittances in partnership with Singapore\'s MAS.', date: new Date(Date.now() - 22 * 3600000).toISOString() },
    { title: 'Bitcoin Core 29.0 Released with Critical Security Patch', link: '#', sourceName: 'BITCOIN OPTECH', source: 'bitcoinops', desc: 'The latest Bitcoin Core release includes a fix for CVE-2024-52911, a vulnerability in script validation discovered by the MIT Digital Currency Initiative.', date: new Date(Date.now() - 24 * 3600000).toISOString() },
    { title: 'a16z Crypto Raises $2.2B for Fifth Dedicated Fund', link: '#', sourceName: 'DECRYPT', source: 'decrypt', desc: 'Andreessen Horowitz has closed its fifth crypto fund at $2.2 billion, signaling sustained institutional venture capital commitment to the sector.', date: new Date(Date.now() - 26 * 3600000).toISOString() },
    { title: 'Japan FSA Proposes Reclassifying Crypto as Financial Instruments', link: '#', sourceName: 'COINTELEGRAPH', source: 'cointelegraph', desc: 'Japan\'s Financial Services Agency is considering reclassifying crypto assets as financial instruments, which would bring them under securities-style regulation.', date: new Date(Date.now() - 28 * 3600000).toISOString() },
    { title: 'Report: DeFi Protocol Revenue Exceeds Traditional Fintech in Q1', link: '#', sourceName: 'THE DEFIANT', source: 'defiant', desc: 'A new research report finds that combined DeFi protocol revenue surpassed that of publicly traded fintech companies for the first time in Q1 2026.', date: new Date(Date.now() - 30 * 3600000).toISOString() },
    { title: 'Circle USDC Market Cap Hits $60B as Stablecoin Demand Grows', link: '#', sourceName: 'THE BLOCK', source: 'block', desc: 'Circle\'s USDC stablecoin has reached a record $60 billion market capitalization, driven by institutional adoption and cross-border payment use cases.', date: new Date(Date.now() - 32 * 3600000).toISOString() },
    { title: 'ECB Digital Euro Pilot Expands to Include Cross-Border CBDC Payments', link: '#', sourceName: 'COINDESK', source: 'coindesk', desc: 'The European Central Bank\'s digital euro pilot now includes cross-border CBDC payment testing between France, Germany, and the Netherlands.', date: new Date(Date.now() - 34 * 3600000).toISOString() },
    { title: 'JPMorgan Launches Tokenized Deposit Platform for Institutional Clients', link: '#', sourceName: 'COINTELEGRAPH', source: 'cointelegraph', desc: 'JPMorgan has launched a tokenized deposit platform allowing institutional clients to settle transactions using blockchain-based deposit tokens.', date: new Date(Date.now() - 36 * 3600000).toISOString() },
  ];

  // ============================================================
  // LOAD
  // ============================================================
  async function load() {
    const state = document.getElementById('state');
    state.innerHTML = '<span class="blink">▮</span> loading…';
    state.classList.remove('err');

    let data;
    try {
      // Cache-bust so GH Pages' CDN doesn't serve stale JSON.
      const res = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (err) {
      // Fall back to demo data for offline / testing
      console.warn('Could not load stories.json, using demo data:', err.message);
      data = { generatedAt: new Date().toISOString(), items: DEMO_ITEMS, demo: true };
    }

    payloadMeta = {
      generatedAt: data.generatedAt,
      errors: data.errors || [],
      demo: data.demo || false,
    };
    allItems = (data.items || []).map(i => ({
      ...i,
      date: new Date(i.date),
    }));
    // Assign topics (multiple per article)
    for (const item of allItems) {
      item.topics = detectTopics(item);
    }

    if (!allItems.length) {
      state.textContent = 'No stories yet. Has the GitHub Action run?';
      state.style.display = 'block';
      return;
    }

    buildFilterBar();
    render();
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    let items = currentFilter === 'all'
      ? allItems
      : allItems.filter(i => i.source === currentFilter);
    if (currentTopic !== 'all') {
      items = items.filter(i => i.topics.includes(currentTopic));
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        (i.title || '').toLowerCase().includes(q) ||
        (i.desc || '').toLowerCase().includes(q) ||
        (i.sourceName || '').toLowerCase().includes(q)
      );
    }

    renderTicker(items);
    renderFlash(items);
    renderGrid(items);

    document.getElementById('storyCount').textContent = items.length + ' stories';

    const when = payloadMeta.generatedAt ? new Date(payloadMeta.generatedAt) : new Date();
    document.getElementById('lastUpdate').textContent =
      'GENERATED ' + when.toLocaleTimeString('en-US', { hour12: false });
  }

  function renderTicker(items) {
    const track = document.getElementById('tickerTrack');
    if (!items.length) {
      track.innerHTML = '<span class="ticker-item">no stories available</span>';
      return;
    }
    const doubled = [...items, ...items];
    track.innerHTML = doubled.map(i => `
      <a class="ticker-item" href="${escapeAttr(i.link)}" target="_blank" rel="noopener">
        <span class="src">[${escapeHtml(i.sourceName)}]</span>
        <span>${escapeHtml(i.title)}</span>
        <span class="age">${formatTime(i.date)}</span>
        <span class="sep">//</span>
      </a>
    `).join('');
    requestAnimationFrame(() => {
      const halfWidth = track.scrollWidth / 2;
      const duration = halfWidth / TICKER_PX_PER_SEC;
      document.documentElement.style.setProperty('--ticker-duration', duration + 's');
    });
  }

  function renderFlash(items) {
    const track = document.getElementById('flashTrack');
    if (flashAnimating) { track.getAnimations().forEach(a => a.cancel()); }
    flashAnimating = false;
    if (!items.length) {
      track.innerHTML = '<span class="flash-item">no stories available</span>';
      return;
    }
    flashIndex = 0;
    showNextFlash(items);
  }

  function showNextFlash(items) {
    const track = document.getElementById('flashTrack');
    const i = items[flashIndex];
    track.innerHTML = `
      <a class="flash-item" href="${escapeAttr(i.link)}" target="_blank" rel="noopener">
        <span class="src">[${escapeHtml(i.sourceName)}]</span>
        <span>${escapeHtml(i.title)}</span>
        ${i.desc ? `<span class="desc">— ${escapeHtml(i.desc)}</span>` : ''}
        <span class="age">${formatTime(i.date)}</span>
      </a>
    `;
    requestAnimationFrame(() => {
      const w = track.scrollWidth;
      const bar = track.parentElement.offsetWidth;
      const duration = (w + bar) / FLASH_PX_PER_SEC;
      track.style.animation = 'none';
      // force reflow
      void track.offsetWidth;
      track.style.animation = `flashScroll ${duration}s linear`;
      flashAnimating = true;
      track.onanimationend = () => {
        flashIndex = (flashIndex + 1) % items.length;
        showNextFlash(items);
      };
    });
  }

  function renderGrid(items) {
    const grid = document.getElementById('grid');
    const state = document.getElementById('state');

    if (!items.length) {
      grid.innerHTML = '';
      state.textContent = 'No stories in this filter.';
      state.classList.remove('err');
      state.style.display = 'block';
      return;
    }

    const TAG_LABELS = { bitcoin: 'Bitcoin', stablecoins: 'Stablecoins', cbdc: 'CBDCs', tokenized: 'Tokenized', us: 'US', europe: 'EU/CA/UK', 'china-hk': 'China+HK', 'asia-pacific': 'Asia Pacific', india: 'India', mena: 'MENA', africa: 'Africa', latam: 'LATAM', 'intl-org': 'Intl Orgs', company: 'Company', thought: 'Thought Piece' };

    function hl(text) {
      const safe = escapeHtml(text);
      if (!searchQuery) return safe;
      const escaped = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="search-highlight">$1</mark>');
    }

    state.style.display = 'none';
    grid.innerHTML = items.map(i => `
      <a class="card" href="${escapeAttr(i.link)}" target="_blank" rel="noopener">
        <div class="meta">
          <span class="src-tag ${i.source}">${escapeHtml(i.sourceName)}</span>
          <span class="time">${formatTime(i.date)}</span>
        </div>
        <h3>${hl(i.title)}</h3>
        ${i.desc ? `<p>${hl(i.desc)}</p>` : ''}
        <div class="topics">${i.topics.map(t => `<span class="topic-tag ${t}">${TAG_LABELS[t] || t}</span>`).join('')}</div>
      </a>
    `).join('');
  }

  function formatTime(d) {
    if (isNaN(d)) return '';
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  // ============================================================
  // EVENTS
  // ============================================================
  document.getElementById('controls').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (btn.id === 'refreshBtn') { load(); return; }
    if (btn.id === 'themeBtn') return; // handled above
    if (btn.dataset.filter) {
      document.querySelectorAll('button[data-filter]').forEach(b =>
        b.classList.toggle('active', b === btn));
      currentFilter = btn.dataset.filter;
      render();
    }
  });

  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b === btn));
    currentTopic = btn.dataset.topic;
    render();
  });

  // Search
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const searchWrap = document.getElementById('searchWrap');
  let searchDebounce = null;

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.trim();
    searchWrap.classList.toggle('has-query', !!searchQuery);
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(render, 150);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchWrap.classList.remove('has-query');
    render();
    searchInput.focus();
  });

  // Ctrl/Cmd+K to focus search
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.blur();
      if (searchQuery) {
        searchInput.value = '';
        searchQuery = '';
        searchWrap.classList.remove('has-query');
        render();
      }
    }
  });

  // initial + poll
  load();
  setInterval(load, POLL_MS);
</script>
