title: "Crypto News Roundup - May 1, 2026"
date: 2026-05-01
author: William Peracchio

sections:
  - name: Top News
    stories:
      - title: "SEC Staff Statement Regarding Broker-Dealer Registration of Certain User Interfaces Utilized to Prepare Transactions in Crypto Asset Securities"
        url: https://www.sec.gov/newsroom/speeches-statements/staff-statement-regarding-broker-dealer-registration-certain-user-interfaces-utilized-prepare-staff-statement-regarding-broker-dealer-registration-certain-user-interfaces-utilized
        source: SEC
        summary: |
          No-action framework for providers of certain crypto asset user interfaces.
          Outlines conditions for operating without registering as broker-dealers under Section 15(a).
          Applies to software (websites, apps, browser extensions) that helps users interact with blockchain protocols using self-custodial wallets.
        see_also:
          - title: "CoinDesk - U.S. SEC says software allowing crypto wallet transactions not considered broker"
            url: https://www.coindesk.com/policy/2026/04/13/u-s-sec-says-software-allowing-crypto-wallet-transactions-aren-t-considered-brokers

      - title: "U.S. CLARITY Act stablecoin bill faces May delay amid bank pushback"
        url: https://crypto.news/u-s-clarity-act-stablecoin-bill-faces-may-delay-amid-bank-pushback/
        source: CryptoNews
        summary: |
          CLARITY Act's April committee review hangs in the balance as Senate Banking juggles Fed chair hearings and crypto legislation.
          Banking groups lobby hard against stablecoin yield, clashing with a White House report that pegs lending impact at just 0.02%.
          White House crypto adviser Patrick Witt publicly calls banks "greedy or ignorant" as pressure mounts to stop stalling the bill.
        see_also:
          - title: "The Block - Clarity Act's stablecoin yield language pushed back; ban on idle balances still intact"
            url: https://www.theblock.co/post/397838/clarity-act-stablecoin-yield-delayed
          - title: "CoinTelegraph - US senator urges delay of CLARITY Act Senate markup until May"
            url: https://cointelegraph.com/news/us-senator-asks-clarity-senate-markup-pushed-back-april
          - title: "The Block - List of 'unsolvable' issues have shrunk, top White House crypto advisory says as momentum builds to pass legislation"
            url: https://www.theblock.co/post/397266/list-of-unsolvable-issues-have-shrunk-top-white-house-crypto-advisory-says-as-momentum-builds-to-pass-legislation

      - title: "SEC 'on the cusp' of onchain tokenized securities exemption: Atkins"
        url: https://cointelegraph.com/news/sec-tokenized-securities-exemption-nears-release
        source: CoinTelegraph
        summary: |
          SEC Chair Paul Atkins said the agency is nearing the release of an exemption for trading tokenized securities onchain.
          Speaking at the Economic Club of Washington, described it as an exemption aimed at enabling limited activity in tokenized markets while longer-term rules develop.

      - title: "Western Union eyeing stablecoin launch to settle global transactions without SWIFT, CEO says"
        url: https://www.coindesk.com/business/2026/04/27/western-union-eyeing-stablecoin-launch-to-settle-global-transactions-without-swift-ceo-says
        source: CoinDesk
        summary: |
          Western Union on track to launch USDPT stablecoin next month.
          Will initially use USDPT behind the scenes as an alternative to SWIFT interbank network for real-time settlement.
          Also developing a Digital Asset Network for crypto-to-fiat cash-outs and a Stable Card for holding stablecoins.

      - title: "New York Attorney General Sues Coinbase, Gemini Over Unlicensed Prediction Markets"
        url: https://thedefiant.io/news/regulation/ny-ag-sues-coinbase-gemini-unlicensed-prediction-markets
        source: The Defiant
        summary: |
          NY AG Letitia James sued Coinbase and Gemini on April 21, alleging both illegally operated unlicensed gambling operations through prediction markets.
          Investigation found prediction markets allowing bets on sports, entertainment, and election outcomes violate NY state gambling laws.

      - title: "Bipartisan PACE Act looks to open Fed payment rails to nonbanks, draws crypto support"
        url: https://www.theblock.co/post/398319/bipartisan-pace-act-looks-open-fed-payment-rails-nonbanks-crypto-support
        source: The Block
        summary: |
          Bill aims to make payments faster and cheaper.
          Blockchain Association CEO Summer Mersinger called the bill an "important step forward."

      - title: "Billionaire backer sues Trump family's crypto firm over alleged extortion"
        url: https://www.bbc.com/news/articles/c8x7kxjgq9xo
        source: BBC
        summary: |
          Justin Sun has accused World Liberty Financial of an "illegal scheme" to seize his WLFI tokens.
          Sun alleges the firm has "frozen" all of his tokens and stripped him of his right to vote on governance issues.

      - title: "BIS Report Warns Banking Services From Crypto Firms Carry Risk"
        url: https://www.pymnts.com/cryptocurrency/2026/bis-report-warns-banking-services-from-crypto-firms-carry-risk/
        source: PYMNTS
        summary: |
          Global banking regulator warns of risks from crypto exchanges offering banking services.
          Services from "multifunction cryptoasset intermediaries" (MCIs) lack protections of traditional financial institutions.

      - title: "BIS Official Says Stablecoins Still Fall Short as Widely Used Payment Instrument"
        url: https://fintechnews.sg/130018/digitalassets/bis-stablecoins/
        source: FinTech News SG
        summary: |
          Pablo Hernandez de Cos warned wider use of stablecoins could create policy challenges from credit provision to monetary policy.
          Stablecoins offer features like programmability and atomic settlement but remain limited in their broader financial role.

      - title: "Circle hit with class action lawsuit over alleged inaction in $280 million Drift exploit"
        url: https://www.theblock.co/post/397840/circle-class-action-lawsuit-drift-exploit
        source: The Block
        summary: |
          Circle facing lawsuit from Drift Protocol investors who lost money in the $280M exploit on April 1.
          Lawsuit alleges Circle failed to act swiftly to freeze stolen USDC.

      - title: "Circle CEO sees 'tremendous opportunity' for yuan-backed stablecoin"
        url: https://www.reuters.com/world/asia-pacific/circle-ceo-sees-tremendous-opportunity-yuan-backed-stablecoin-2026-04-16/
        source: Reuters
        summary: |
          Jeremy Allaire says stablecoins are a good way to "export" a currency.
          Thinks China could launch a yuan-backed stablecoin within three to five years.

      - title: "Circle CEO says he won't freeze USDC without a court order even as hackers walk away with millions"
        url: https://www.coindesk.com/business/2026/04/13/circle-ceo-says-he-won-t-freeze-usdc-without-a-court-order-even-as-hackers-walk-away-with-millions
        source: CoinDesk
        summary: |
          Jeremy Allaire said Circle freezes USDC wallets only when directed by law enforcement or courts, not in real time during hacks.
          Critics argue claim delays have allowed over $420 million in illicit funds to escape since 2022.

      - title: "KelpDAO Bridge Hack Pinned on North Korea's Lazarus Group"
        url: https://finance.yahoo.com/markets/crypto/articles/layerzero-pins-292m-kelpdao-bridge-113544792.html
        source: Decrypt via Yahoo Finance
        summary: |
          $292M exploit drained from KelpDAO's cross-chain bridge, likely by North Korea's Lazarus Group (TraderTraitor subunit).
          Attackers drained 116,500 rsETH, setting off withdrawals across DeFi that pulled more than $10 billion out of Aave.
        see_also:
          - title: "CoinDesk - Crypto's massive exploit may force big banks to rethink their blockchain plans, Jefferies warns"
            url: https://www.coindesk.com/business/2026/04/21/crypto-s-massive-exploit-may-force-big-banks-to-rethink-their-blockchain-plans-jefferies-warns
          - title: "CoinDesk - Aave raises nearly 80% of the $200 million it needs to cover bad debt left by Kelp DAO exploit"
            url: https://www.coindesk.com/business/2026/04/26/aave-raises-nearly-80-of-the-usd200-million-it-needs-to-cover-bad-debt-left-by-kelp-dao-exploit
          - title: "LayerZero - KelpDAO Incident Statement"
            url: https://layerzero.network/blog/kelpdao-incident-statement

      - title: "Kevin Warsh discloses investments in a slew of crypto firms"
        url: https://www.theblock.co/post/397409/ahead-senate-confirmation-fed-pick-kevin-warsh-crypto-investments
        source: The Block
        summary: |
          Kevin Warsh disclosed holdings including investments in Polymarket and over 20 different crypto-linked entities.

      - title: "Researcher breaks 15-bit elliptic curve key in 'largest quantum attack,' wins 1 bitcoin bounty from Project Eleven"
        url: https://www.theblock.co/post/398792/researcher-breaks-15-bit-elliptic-curve-key-wins-1-bitcoin-bounty-project-eleven
        source: The Block
        summary: |
          Giancarlo Lelli derived a 15-bit elliptic curve key on a publicly accessible quantum computer.
          Largest quantum attack on elliptic curve cryptography to date, awarded 1 BTC bounty.
          However, it remains far below real-world cryptographic standards.

  - name: Interviews / Podcasts / Top Thought Pieces
    stories:
      - title: "How worried should Wall St be about the stablecoin threat to deposits?"
        url: https://www.ft.com/content/172d717c-ca98-453c-9c44-f13e2342e231
        source: FT
        summary: |
          Upcoming Clarity Act seeks to resolve whether stablecoin issuers can offer interest-like rewards, impacting a market projected to grow from $300B to $3T by 2030.
          While bankers fear stablecoins will drain deposits, the threat is currently limited because stablecoins lack transactional convenience.

      - title: "Stablecoin transfer volume drops 19% even as supply keeps rising"
        url: https://cointelegraph.com/news/stablecoin-supply-grows-as-transfer-volume-drops-nearly-20-rwaxyz
        source: CoinTelegraph
        summary: |
          Monthly transfer volume fell nearly 20% over the past 30 days, even as total supply and holder count continued to rise.
          30-day transfer volume dropped 19.18% to $8.31 trillion; market cap rose 2.06% to $305.29 billion.

      - title: "Tokenised collateral goes global"
        url: https://thevx.io/campaign/dlt-and-digital-assets/
        source: The ValueExchange with Digital Asset
        summary: |
          Cross-border markets cause ~$6T in collateral to sit idle every night, resulting in $1.2B in lost interest earnings daily.
          Live repo trades expanded to include UK Gilts and European Government Bonds across ten time zones and three jurisdictions.

      - title: "'Rails Have Shifted' - Stablecoins Topped ACH At $7.5 Trillion A Month"
        url: https://www.forbes.com/sites/digital-assets/2026/04/20/rails-have-shifted-stablecoins-topped-ach-at-75-trillion-a-month/
        source: Forbes
        summary: |
          Monthly stablecoin settlement volume has surpassed ACH network for the first time, reaching $7.5 trillion.
          USDC now leads in adjusted transaction volume at ~70% of activity due to GENIUS Act compliance.
          Onchain dollar settlement projections could reach $719 trillion by 2035.

      - title: "Stablecoins in 2025: Developments and Financial Stability Implications"
        url: https://www.federalreserve.gov/econres/notes/feds-notes/stablecoins-in-2025-developments-and-financial-stability-implications-20260408.html
        source: FEDS Notes
        summary: |
          During 2025, stablecoins grew by about 50% in market cap, with transaction volume and DeFi use surging.
          Stablecoins with safer and more liquid reserve composition have exhibited relatively stronger adoption.

      - title: "Tokenised bonds: assessing efficiency and liquidity in a nascent market"
        url: https://www.ecb.europa.eu/press/financial-stability-publications/macroprudential-bulletin/html/ecb.mpbu202604_03.en.html
        source: ECB
        summary: |
          Investigates empirically whether tokenisation of bonds improves bond issuance efficiency and market liquidity.

  - name: US
    stories:
      - title: "Ondo seeks SEC clearance for tokenized equities model on Ethereum"
        url: https://www.theblock.co/post/397258/ondo-seeks-sec-clearance-tokenized-equities-model-ethereum
        source: The Block
        summary: |
          The SEC is signaling openness to tokenization, encouraging firms to engage directly.
          Tokenized RWAs total about $23 billion today, projections see growth into the trillions.

      - title: "FASB Wants Companies to Reveal Stablecoin Holdings"
        url: https://www.pymnts.com/cryptocurrency/2026/fasb-wants-companies-to-reveal-stablecoin-holdings/
        source: PYMNTS
        summary: |
          FASB voted to propose that all companies each year reveal stablecoin holdings as part of cash equivalents disclosure.

  - name: International
    stories:
      - title: "Hong Kong sets high bar for stablecoin issuance with first licences"
        url: https://www.asiaasset.com/analysis/hong-kong-sets-high-bar-for-stablecoin-issuance-with-first-licences/
        source: Asia Asset Management
        summary: |
          HKMA awarded its first stablecoin issuer licences to HSBC and a Standard Chartered Bank-led consortium on April 10.
          Decision concluded a long regulatory process following HKMA's first discussion paper in January 2022.

      - title: "Hong Kong warns of fake tokens posing as HSBC's stablecoin"
        url: https://www.theblock.co/post/399308/hong-kong-warns-fake-stablecoins
        source: The Block
        summary: |
          HKMA warned that tokens named "HKDAP" and "HSBC" are not associated with any licensed stablecoin issuers.

      - title: "SFC Opens Secondary Trading of Tokenised Products in Hong Kong Under New Framework"
        url: https://fintechnews.hk/38473/blockchain/tokenised-products-hong-kong-sfc-secondary-trading/
        source: FinTech News HK
        summary: |
          SFC launched a framework to pilot secondary trading of tokenised SFC-authorised investment products.
          Initial batch will focus on tokenised money market funds.

      - title: "EU adviser says 'MiCA 2' is likely as crypto market matures"
        url: https://cointelegraph.com/news/eu-adviser-says-mica-2-is-likely-as-crypto-market-matures-pbw-2026
        source: CoinTelegraph
        summary: |
          MiCA review is part of an effort to ensure rules keep pace with a changing market structure.

      - title: "Russia passes crypto bill in first reading; permits use in foreign trade settlements"
        url: https://www.theblock.co/post/398402/russias-crypto-bill-first-reading
        source: The Block
        summary: |
          Russia's State Duma passed a crypto bill to establish a framework for crypto circulation.
          Prohibits domestic payments but allows use in foreign economic activities.

      - title: "French minister urges banks to expand euro stablecoins, tokenized deposits"
        url: https://www.theblock.co/post/397902/french-minister-urges-banks-to-expand-euro-stablecoins-tokenized-deposits-report
        source: The Block
        summary: |
          French Finance Minister Roland Lescure urged European banks to expand euro-pegged stablecoins and explore tokenized deposits.

      - title: "EU sanctions target Russian crypto exchanges, stablecoins and CBDC"
        url: https://cointelegraph.com/news/eu-sanctions-russia-crypto-exchanges-stablecoins-cbdc
        source: CoinTelegraph
        summary: |
          European Commission announced a total sectorial ban on carrying out exchanges with any Russian crypto asset service provider.

      - title: "Canada proposes crypto ATM ban over scams and money laundering"
        url: https://cointelegraph.com/news/canada-proposes-crypto-atm-ban-over-scams-and-money-laundering
        source: CoinTelegraph
        summary: |
          Canadian government proposed banning Bitcoin and other crypto ATMs, calling them a "primary method for scammers to defraud victims."

      - title: "Canada advances bill to ban crypto political donations"
        url: https://cointelegraph.com/news/canada-advances-bill-ban-crypto-political-donations
        source: CoinTelegraph
        summary: |
          Bill C-25, the Strong and Free Elections Act, passed a second reading in the House of Commons.

      - title: "UK sets out plan to integrate payments rules covering stablecoins and tokenized deposits"
        url: https://www.theblock.co/post/398244/uk-sets-out-plan-to-integrate-payments-rules-covering-stablecoins-and-tokenized-deposits
        source: The Block
        summary: |
          UK Treasury announced a regulatory package to consolidate stablecoins and tokenized deposits into a single framework alongside traditional payment services.

  - name: Company Updates
    stories:
      - title: "Circle 'Exploring' Arc Network Token Launch, Proof-of-Stake Shift"
        url: https://decrypt.co/364295/circle-exploring-arc-network-token-proof-stake-shift-ceo
        source: Decrypt
        summary: |
          Circle is "exploring" a token for Arc Network, its stablecoin-focused layer-1 blockchain.
          Mainnet beta launch earmarked for 2026.

      - title: "Circle Skills Launch on GitHub"
        url: https://github.com/circlefin/skills
        source: Circle
        summary: |
          Instructional framework (Skills) to help AI agents understand best practices for building with USDC.
          Covers decision frameworks (e.g. CCTP vs. Gateway), correct patterns (6-decimal precision), and error prevention.

      - title: "Tether Asserts Stablecoin Dominance Over Circle's USDC Amid Major Crypto Hacks"
        url: https://decrypt.co/365049/tether-stablecoin-dominance-over-circle-usdc-major-crypto-hacks
        source: Decrypt
        summary: |
          USDT market cap growth has outpaced USDC since Drift Protocol was exploited for $285 million.
          Nansen analyst posited that Tether's stablecoin likely offers superior liquidity during DeFi crises.

      - title: "Tether backs Stablecoin Development Corporation's $134 million private placement used to acquire SKY tokens"
        url: https://www.theblock.co/post/397654/tether-stablecoin-development-corporation-134-million-private-placement-acquire-sky-tokens
        source: The Block
        summary: |
          Tether supported SDEV's $134M private placement in January. SDEV holds SKY governance tokens and uses Sky's USDS stablecoin.

      - title: "Tether launches self-custodial wallet with cloud backup option"
        url: https://cointelegraph.com/news/tether-self-custodial-wallet-gas-free-transactions
        source: CoinTelegraph
        summary: |
          Tether launched tether.wallet supporting USDT, XAUt (XAUT), US-focused USAT, and Bitcoin.

      - title: "Tether Freezes $334 Million in Stablecoins Linked to Illegal Activity"
        url: https://www.pymnts.com/blockchain/2026/tether-freezes-334-million-in-stablecoins-linked-to-illegal-activity
        source: PYMNTS
        summary: |
          Tether froze $344 million in stablecoins on April 23, following information from U.S. authorities.

      - title: "Tempo unveils pragmatic privacy solution called Zones"
        url: https://www.theblock.co/post/397820/tempo-unveils-pragmatic-privacy-solution-called-zones-a-way-to-run-permissioned-parallel-blockchains
        source: The Block
        summary: |
          Each Zone is a private execution environment managed by a trusted entity like a financial institution.
          Designed for institutional use cases like payroll, treasury, and settlements.

      - title: "Visa, Stripe and Zodia Custody by Standard Chartered become validators on Tempo's payments blockchain"
        url: https://www.theblock.co/post/397286/visa-stripe-zodia-custody-standard-chartered-validators-tempo
        source: The Block
        summary: |
          Notable early additions for Tempo as it builds out its validator set alongside an agentic payments protocol.

      - title: "DoorDash to Pay Delivery Workers in Stablecoins via Stripe's Tempo Blockchain"
        url: https://finance.yahoo.com/markets/crypto/articles/doordash-pay-delivery-workers-stablecoins-155435944.html
        source: Decrypt via Yahoo Finance
        summary: |
          DoorDash will use Tempo to pay delivery workers with stablecoins in more than 40 countries.

      - title: "Tech giant Meta starts paying some creators in stablecoin with Stripe's support"
        url: https://www.coindesk.com/business/2026/04/29/tech-giant-meta-starts-paying-some-creators-in-stablecoin-with-stripe-s-support
        source: CoinDesk
        summary: |
          Meta began rolling out stablecoin payouts to select creators in USDC on Solana or Polygon.
          Marks Meta's renewed push into stablecoin payments after Libra/Diem was shut down.

      - title: "Fireblocks Intros Stablecoin Lending for Institutional Clients"
        url: https://www.pymnts.com/blockchain/2026/fireblocks-intros-stablecoin-lending-for-institutional-clients/
        source: PYMNTS
        summary: |
          Fireblocks debuted Earn tool letting institutional customers lend stablecoins to Morpho and Aave protocols.

      - title: "Major European Bank Consortium Qivalis Plans to Leverage Fireblocks to Power MiCAR-compliant Euro-denominated Stablecoin"
        url: https://www.prnewswire.com/news-releases/major-european-bank-consortium-qivalis-plans-to-leverage-fireblocks-to-power-micar-compliant-euro-denominated-stablecoin-302748775.html
        source: Fireblocks
        summary: |
          Twelve major European banks creating a MiCAR-compliant euro-backed stablecoin, launching second half of 2026.
          Banks include Banca Sella, BBVA, BNP Paribas, CaixaBank, Danske Bank, DekaBank, DZ BANK, ING, KBC, Raiffeisen, SEB, and UniCredit.

      - title: "Visa Adds 5 Blockchains as Stablecoin Settlement Volume Surges"
        url: https://www.pymnts.com/visa/2026/visa-adds-5-blockchains-as-stablecoin-settlement-volume-surges
        source: PYMNTS
        summary: |
          Visa adding Arc, Base, Canton, Polygon and Tempo, bringing total to nine supported blockchains.

      - title: "Morgan Stanley launches stablecoin reserves fund aligned with GENIUS Act requirements"
        url: https://www.theblock.co/post/398784/morgan-stanley-launches-stablecoin-reserves-fund-aligned-with-genius-act-requirements
        source: The Block
        summary: |
          Government money market fund maintaining stable $1 NAV, investing in cash and U.S. Treasury instruments with maturities of 93 days or less.

      - title: "SocGen brings stablecoin to MetaMask wallet users"
        url: https://www.finextra.com/newsarticle/47587/socgen-brings-stablecoin-to-metamask-wallet-users
        source: FinExtra
        summary: |
          Societe Generale's SG-Forge joining forces with Consensys to expand access to its USD CoinVertible stablecoin via MetaMask.
          First regulated stablecoin issued by a major European bank available in MetaMask.

      - title: "Western Union to launch stablecoin next month, with 'Stable Card' planned for global consumers"
        url: https://www.theblock.co/post/398905/western-union-stablecoin-next-month
        source: The Block
        summary: |
          USDPT launch confirmed for next month plus a Digital Asset Network and stablecoin payment card.

      - title: "MoneyGram and NALA Partner for Stablecoin Settlement and Modernized Payouts Across Emerging Markets"
        url: https://www.nala.com/blog/moneygram-and-nala-partner-for-stablecoin-settlement-and-modernized-payouts-across-emerging-markets
        source: Nala
        summary: |
          Strategic partnership to power cross-border payouts into emerging markets using stablecoin-based settlement infrastructure.

      - title: "eToro to acquire crypto wallet Zengo in $70 million deal"
        url: https://www.coindesk.com/business/2026/04/15/etoro-to-acquire-crypto-wallet-zengo-in-usd70-million-deal
        source: CoinDesk
        summary: |
          eToro moving into self-custody with Zengo acquisition, targeting tokenized assets and decentralized trading models.
