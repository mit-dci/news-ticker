name: Update feeds

on:
  # Every 30 minutes. GitHub cron is "best effort" — expect some skew,
  # and scheduled runs can pause on inactive repos (commit anything every
  # ~60 days to keep them alive).
  schedule:
    - cron: '*/30 * * * *'
  # Let you trigger a run manually from the Actions tab.
  workflow_dispatch:

# Needed so the workflow can push the updated stories.json back to the repo.
permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch feeds
        run: node scripts/fetch-feeds.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only commit if stories.json actually changed.
          if git diff --quiet stories.json; then
            echo "No changes to stories.json."
            exit 0
          fi

          git add stories.json
          git commit -m "chore: update feeds ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
